name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Create draft release once ──────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Visemte ${tag}`,
              draft: true,
              prerelease: false,
            })
            return data.id
          result-encoding: string

  # ── Platform builds ────────────────────────────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS – all on macos-latest (Apple Silicon); x86_64 cross-compiled via Rust
          - platform: macos-latest
            target: universal-apple-darwin
            label: macOS-universal
            extra_targets: x86_64-apple-darwin aarch64-apple-darwin

          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-aarch64
            extra_targets: ''

          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x86_64
            extra_targets: x86_64-apple-darwin

          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
            extra_targets: ''

          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            label: Windows-arm64
            extra_targets: ''

          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-amd64
            extra_targets: ''

          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            label: Linux-arm64
            extra_targets: ''

    runs-on: ${{ matrix.platform }}
    name: Build – ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add extra Rust targets (macOS cross-compilation)
        if: matrix.extra_targets != ''
        run: rustup target add ${{ matrix.extra_targets }}

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Rename bundles ─────────────────────────────────────────────────────
      - name: Rename bundle files
        run: node scripts/rename-bundles.mjs

      # ── Upload to release ──────────────────────────────────────────────────
      - name: Upload release assets
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TARGET: ${{ matrix.target }}
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const target = process.env.TARGET
            const releaseId = process.env.RELEASE_ID

            const bundleDirs = {
              'universal-apple-darwin':    ['src-tauri/target/universal-apple-darwin/release/bundle/dmg'],
              'aarch64-apple-darwin':      ['src-tauri/target/aarch64-apple-darwin/release/bundle/dmg'],
              'x86_64-apple-darwin':       ['src-tauri/target/x86_64-apple-darwin/release/bundle/dmg'],
              'x86_64-pc-windows-msvc':    [
                'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis',
                'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi',
              ],
              'aarch64-pc-windows-msvc':   [
                'src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis',
                'src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi',
              ],
              'x86_64-unknown-linux-gnu':  [
                'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb',
                'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage',
                'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm',
              ],
              'aarch64-unknown-linux-gnu': [
                'src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb',
                'src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage',
                'src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm',
              ],
            }

            const extensions = new Set(['.dmg', '.exe', '.msi', '.deb', '.appimage', '.rpm'])
            const dirs = bundleDirs[target] ?? []

            for (const dir of dirs) {
              if (!fs.existsSync(dir)) continue
              for (const file of fs.readdirSync(dir)) {
                const ext = path.extname(file).toLowerCase()
                if (!extensions.has(ext)) continue
                const filePath = path.join(dir, file)
                console.log(`Uploading: ${file}`)
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: releaseId,
                  name: file,
                  data: fs.readFileSync(filePath),
                })
              }
            }
